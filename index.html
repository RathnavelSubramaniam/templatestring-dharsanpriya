<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Literal Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h2>Template Literal Example</h2>
    
    <label for="name">Name:</label>fgh
    <input type="text" id="name"><br><br>
    
    <label for="age">Age:</label>
    <input type="number" id="age"><br><br>
    
    <button onclick="displayMessage()">Show Message</button>
    
    <h3 id="result"></h3>

    <script>
        function displayMessage() {
          
            const nameValue = document.getElementById('name').value;
            
            const ageValue = document.getElementById('age').value;
            if (!nameValue || !ageValue) {
                document.getElementById('result').innerText = "Please enter both name and age.";
                return;
            }
            
            const message = `Hello, my name is ${nameValue} and I am ${ageValue} years old.`;
            document.getElementById('result').innerText = message;
        }
    </script>

</body>
</html>
